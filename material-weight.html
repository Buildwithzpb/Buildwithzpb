<!doctype html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Material Weight Calculator</title>
<link rel="stylesheet" href="../assets/css/style.css">
</head><body>
<h1>Material Weight Calculator</h1>

<label>Material
<select id="material">
<option value="a36Steel">A36 Steel</option>
<option value="steel1018">1018 Steel</option>
<option value="stainless304">304 Stainless</option>
<option value="aluminum6061">6061 Aluminum</option>
<option value="brass360">360 Brass</option>
<option value="copper110">110 Copper</option>
</select>
</label>

<label>Shape
<select id="shape">
<option value="plate">Plate</option>
<option value="flatBar">Flat Bar</option>
<option value="roundBar">Round Bar</option>
<option value="squareBar">Square Bar</option>
<option value="roundTube">Round Tube</option>
</select>
</label>

<div id="inputs"></div>

<label>Quantity
<input id="quantity" type="number" value="1" min="1">
</label>

<button id="calculate">Calculate</button>

<pre id="results">Ready.</pre>

<script type="module" src="../assets/js/calculator.js"></script>
</body></html>
